<style>

<body class="flex flex-col min-h-screen">
<!-- Transactional Screen: Navigation Shell is Suppressed according to the Semantic Shell Mandate -->
<main class="flex-grow flex flex-col px-margin-mobile pt-stack-lg pb-stack-md max-w-md mx-auto w-full">
<!-- Top Section: Brand Identity -->
<header class="flex flex-col items-center justify-center pt-12 pb-16">
<div class="relative group">
<div class="absolute -inset-1 bg-primary-fixed blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
<div class="relative bg-surface-container-lowest p-6 rounded-xl border border-white/5 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed text-[64px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
<h1 class="font-display-lg text-display-lg mt-8 text-primary-fixed tracking-tight">VOLTAGE</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-2 uppercase tracking-[0.2em]">Field Operations Pro</p>
</header>
<!-- Middle Section: Input Fields -->
<section class="flex flex-col space-y-stack-md flex-grow">
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface ml-1" for="email">Work Email</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border border-white/10 rounded-xl px-5 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed input-focus-effect" id="email" placeholder="agent@voltage.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface-variant/40">alternate_email</span>
</div>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface ml-1" for="password">Secure Password</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border border-white/10 rounded-xl px-5 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed input-focus-effect" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-4 text-on-surface-variant/40 hover:text-on-surface transition-colors" id="togglePassword">
<span class="material-symbols-outlined" id="eyeIcon">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="w-5 h-5 border border-white/20 rounded bg-surface-container peer-checked:bg-primary-fixed peer-checked:border-primary-fixed transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary font-bold hidden peer-checked:block">check</span>
</div>
<span class="ml-3 font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me active</span>
</label>
<a class="font-label-sm text-label-sm text-primary-fixed hover:underline" href="#">Forgot Access?</a>
</div>
</section>
<!-- Bottom Section: Primary Action -->
<section class="mt-stack-lg flex flex-col space-y-4">
<button class="w-full h-[56px] bg-primary-fixed text-on-primary-fixed font-label-md text-label-md rounded-xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[0_8px_24px_rgba(195,244,0,0.15)]">

                <span class="material-symbols-outlined text-[18px]">login</span>
</button>

            </p>

<!-- Optional Visual Atmosphere: WebGL Shader Placeholder -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary-fixed/5 rounded-full blur-[100px]"></div>
</div>
<script>
        // Micro-interactions
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
        });

        // Simple button haptic simulation for desktop (scale)
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
