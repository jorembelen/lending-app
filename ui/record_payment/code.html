<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #e5e2e1;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        /* Hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom Focus Ring for Lime */
        .focus-lime:focus {
            outline: none;
            border-color: #c3f400 !important;
            box-shadow: 0 0 0 1px #c3f400;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#474746",
                        "on-tertiary": "#68000f",
                        "primary-fixed": "#c3f400",
                        "surface-container-high": "#2a2a2a",
                        "surface-tint": "#abd600",
                        "inverse-primary": "#506600",
                        "secondary-container": "#474746",
                        "secondary-fixed-dim": "#c8c6c5",
                        "secondary": "#c8c6c5",
                        "on-primary": "#283500",
                        "on-primary-container": "#556d00",
                        "on-error": "#690005",
                        "on-primary-fixed-variant": "#3c4d00",
                        "error-container": "#93000a",
                        "outline-variant": "#444933",
                        "on-tertiary-container": "#b6353a",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "on-secondary": "#313030",
                        "on-surface-variant": "#c4c9ac",
                        "primary-container": "#c3f400",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#ffffff",
                        "surface": "#131313",
                        "surface-variant": "#353534",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "outline": "#8e9379",
                        "on-secondary-container": "#b7b5b4",
                        "primary": "#ffffff",
                        "primary-fixed-dim": "#abd600",
                        "surface-container-low": "#1c1b1b",
                        "surface-bright": "#3a3939",
                        "surface-container-highest": "#353534",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary-fixed": "#161e00",
                        "on-tertiary-fixed-variant": "#8c1520",
                        "on-background": "#e5e2e1",
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "background": "#131313",
                        "tertiary-fixed": "#ffdad8",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#410006",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-container": "#ffdad8",
                        "secondary-fixed": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-sm": "12px",
                        "touch-target-min": "48px",
                        "stack-md": "24px",
                        "base": "8px",
                        "margin-mobile": "20px",
                        "stack-lg": "40px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-[120px]">
<!-- Top AppBar (from JSON context) -->
<header class="fixed top-0 w-full z-50 bg-background flex items-center justify-between px-margin-mobile h-touch-target-min">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Record Payment</h1>
</div>
<button class="active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="pt-[64px] px-margin-mobile">
<!-- Context Card -->
<section class="mt-stack-md">
<div class="bg-[#1A1A1A] rounded-xl p-4 border border-white/10 flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 bg-surface-variant">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a middle-aged male loan borrower with a serious yet approachable expression. He is wearing a clean, casual button-down shirt. The lighting is bright and outdoor-natural, set against a blurred urban background. The image has a high-contrast modern feel consistent with a fintech application, using sharp focus and a neutral color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuANfNAxx-9CiMQ-kTg6zqjHrMjN-9nRX2xXa0CGzWK_ewmgkadYhVPqTeakMB0ljoChWj7g-FhGTB3mieB6vA-VV0hZI58f3XP88RNvUSYxleIRgnb6yg-R-npr9KaQVIES71gxrvBI2YEdwOn3bDc0BCLCJOrJXR5oRZxmDM_dS1c7KSuov086137rpfoVFdB6M_oMJdvmSVACZmIJCccqVXvvN6hXp1LA_v5E2NEMg6GE_92y6WwkH8EjJOXg-VwmMiYotUnqzFux"/>
</div>
<div class="flex-grow">
<h2 class="font-label-md text-on-surface font-bold">Marcus Thorne</h2>
<p class="font-label-sm text-on-surface-variant">ID: LN-8849-PX</p>
</div>
<div class="text-right">
<span class="inline-block px-2 py-1 rounded bg-red-900/30 text-error font-label-sm uppercase tracking-wider">Overdue</span>
</div>
</div>
</section>
<!-- Amount Input Section -->
<section class="mt-stack-lg text-center">
<label class="block font-label-sm text-on-surface-variant uppercase tracking-widest mb-2">Current Due Amount</label>
<div class="relative flex flex-col items-center">
<div class="flex items-center justify-center gap-2">
<span class="font-display-lg text-display-lg text-primary-fixed">$</span>
<input class="bg-transparent border-none text-center font-display-lg text-display-lg text-primary-fixed w-full max-w-[280px] focus:ring-0 p-0" id="paymentInput" step="0.01" type="number" value="1250.00"/>
</div>
<div class="h-[2px] w-40 bg-primary-fixed mt-2 opacity-50"></div>
</div>
<!-- Quick Select Buttons -->
<div class="flex justify-between gap-3 mt-stack-md">
<button class="flex-1 h-touch-target-min bg-surface-container rounded-xl font-label-md text-on-surface border border-white/5 active:bg-surface-variant transition-colors" onclick="setAmount(1250.00)">
                    Exact
                </button>
<button class="flex-1 h-touch-target-min bg-surface-container rounded-xl font-label-md text-on-surface border border-white/5 active:bg-surface-variant transition-colors" onclick="setAmount(625.00)">
                    Partial (50%)
                </button>
<button class="flex-1 h-touch-target-min bg-surface-container rounded-xl font-label-md text-on-surface border border-white/5 active:bg-surface-variant transition-colors" onclick="clearAmount()">
                    Custom
                </button>
</div>
</section>
<!-- Dynamic Summary -->
<section class="mt-stack-lg bg-[#1A1A1A] p-5 rounded-xl border border-white/10">
<div class="flex justify-between items-center mb-4">
<span class="font-body-md text-on-surface-variant">Total Remaining</span>
<span class="font-headline-md text-on-surface">$4,200.00</span>
</div>
<div class="h-[1px] bg-white/5 mb-4"></div>
<div class="flex justify-between items-center">
<span class="font-body-md text-on-surface-variant">New Balance</span>
<span class="font-headline-md text-primary-fixed font-bold" id="newBalanceDisplay">$2,950.00</span>
</div>
</section>
<!-- Notes Field -->
<section class="mt-stack-md">
<label class="block font-label-md text-on-surface-variant mb-2 ml-1">Payment Notes (Optional)</label>
<textarea class="w-full bg-[#1A1A1A] rounded-xl border border-white/10 p-4 font-body-md text-on-surface focus-lime transition-all resize-none h-32" placeholder="Add details about the collection..."></textarea>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-background/80 backdrop-blur-md p-margin-mobile z-50">
<button class="w-full h-[56px] bg-primary-fixed text-[#0A0A0A] font-label-md font-bold rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="confirmBtn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            CONFIRM PAYMENT
        </button>
</div>
<!-- Bottom Navigation Bar (Contextual Logic: Hidden on focus task) -->
<!-- Suppressed per "Task-Focused" rule in System Instructions -->
<script>
        const paymentInput = document.getElementById('paymentInput');
        const newBalanceDisplay = document.getElementById('newBalanceDisplay');
        const totalRemaining = 4200.00;

        function updateBalance() {
            const amount = parseFloat(paymentInput.value) || 0;
            const newBalance = Math.max(0, totalRemaining - amount);
            newBalanceDisplay.textContent = `$${newBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // Visual feedback if amount exceeds total
            if (amount > totalRemaining) {
                newBalanceDisplay.classList.add('text-error');
                newBalanceDisplay.classList.remove('text-primary-fixed');
            } else {
                newBalanceDisplay.classList.remove('text-error');
                newBalanceDisplay.classList.add('text-primary-fixed');
            }
        }

        function setAmount(val) {
            paymentInput.value = val.toFixed(2);
            updateBalance();
        }

        function clearAmount() {
            paymentInput.value = '';
            paymentInput.focus();
            updateBalance();
        }

        paymentInput.addEventListener('input', updateBalance);

        // Interaction Feedback
        const confirmBtn = document.getElementById('confirmBtn');
        confirmBtn.addEventListener('click', () => {
            const amount = paymentInput.value;
            if(!amount || amount <= 0) {
                alert('Please enter a valid payment amount.');
                return;
            }
            confirmBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING...';
            confirmBtn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                confirmBtn.innerHTML = '<span class="material-symbols-outlined">done_all</span> SUCCESSFUL';
                confirmBtn.classList.replace('bg-primary-fixed', 'bg-green-500');
                setTimeout(() => {
                    // Simulating a redirect or reset
                    window.location.reload();
                }, 1500);
            }, 2000);
        });

        // Ensure input field selects all on focus for mobile ease
        paymentInput.addEventListener('focus', function() {
            this.select();
        });
    </script>
</body></html>
