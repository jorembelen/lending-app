<style>
        body {
            background-color: #0c0e14;
            color: #e2e2eb;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #2D2F39;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pin-dot.filled {
            background-color: #c3f400;
            border-color: #c3f400;
            box-shadow: 0 0 12px rgba(195, 244, 0, 0.4);
            transform: scale(1.1);
        }

        .keypad-button {
            height: 72px;
            width: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 24px;
            font-weight: 600;
            color: #e2e2eb;
            transition: background-color 0.2s, transform 0.1s;
        }

        .keypad-button:active {
            background-color: #1a1c24;
            transform: scale(0.9);
        }

        .btn-glow:active {
            box-shadow: 0 0 20px rgba(195, 244, 0, 0.3);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex flex-col min-h-screen">
<!-- Subtle Ambient Background Animation -->
<div class="fixed inset-0 -z-10 opacity-30">

</div>
<!-- Main Content Canvas -->

<!-- Header Section -->
<div class="w-full text-center mt-lg fade-in">
<div class="mb-lg flex justify-center">

<img class="w-full h-full object-cover rounded-full" data-alt="A professional close-up portrait of a friendly young Latino man named Alejandro, smiling confidently. He is set against a dark, minimalist background that fits a high-end fintech aesthetic. The lighting is soft and directional, highlighting his features with a warm, approachable glow that aligns with the Voltage brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWpA-HpS80dibhREu5qags3a15jv4DigWZGZMnV45saTcm5NCxTiFpTSLVP6nGfIH2-hIRXVQkoigyZJQPVGzhdDI3WPYjAcR7ejkbyOUkqreRm5qbbrY6JWfqwgGrHt_W1vio9HUj-1noG6g9ExQNluZzHFua2DPz5WIXfiVuaX0J7DZdJD1dzHvhddy-5o4o1y4pew7tyOH0HNnxSLwIi087RMIbB3V1y-ShidBIGvB-pewiTDpeaqgThP8ihK8WLu_EMt9PVwJf"/>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">
                Welcome back, Alejandro
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">
                Enter your PIN to continue
            </p>
</div>
<!-- PIN Input Visualization -->
<div class="flex gap-sm justify-center my-lg fade-in" style="animation-delay: 0.1s;">
<div class="pin-dot" id="dot-1"></div>
<div class="pin-dot" id="dot-2"></div>
<div class="pin-dot" id="dot-3"></div>
<div class="pin-dot" id="dot-4"></div>
<div class="pin-dot" id="dot-5"></div>
<div class="pin-dot" id="dot-6"></div>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-y-card-gap gap-x-lg w-full max-w-[280px] fade-in" style="animation-delay: 0.2s;">
<button class="keypad-button" onclick="addPin('1')">1</button>
<button class="keypad-button" onclick="addPin('2')">2</button>
<button class="keypad-button" onclick="addPin('3')">3</button>
<button class="keypad-button" onclick="addPin('4')">4</button>
<button class="keypad-button" onclick="addPin('5')">5</button>
<button class="keypad-button" onclick="addPin('6')">6</button>
<button class="keypad-button" onclick="addPin('7')">7</button>
<button class="keypad-button" onclick="addPin('8')">8</button>
<button class="keypad-button" onclick="addPin('9')">9</button>
<div class="flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[24px]">fingerprint</span>
</div>
<button class="keypad-button" onclick="addPin('0')">0</button>
<button class="keypad-button" onclick="removePin()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Actions -->
<div class="w-full space-y-md mt-lg fade-in" style="animation-delay: 0.3s;">
<button class="w-full h-14 bg-primary-container text-on-primary font-bold rounded-xl text-lg flex items-center justify-center transition-all scale-100 active:scale-95 btn-glow" id="loginBtn">
                Log In
            </button>
<div class="text-center">
<a class="font-label-caps text-label-caps text-primary-fixed-dim hover:underline transition-all" href="#">
                    Forgot PIN?
                </a>
</div>
</div>
</main>
<script>
        let pin = "";
        const maxPinLength = 6;
        const dots = [
            document.getElementById('dot-1'),
            document.getElementById('dot-2'),
            document.getElementById('dot-3'),
            document.getElementById('dot-4'),
            document.getElementById('dot-5'),
            document.getElementById('dot-6')
        ];
        const loginBtn = document.getElementById('loginBtn');

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < pin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });

            // Visual feedback for complete PIN
            if (pin.length >= 4) {
                loginBtn.classList.remove('opacity-50', 'pointer-events-none');
                loginBtn.classList.add('opacity-100');
            } else {
                loginBtn.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function addPin(num) {
            if (pin.length < maxPinLength) {
                pin += num;
                updateDots();
                
                // Haptic feedback simulation
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            }
        }

        function removePin() {
            if (pin.length > 0) {
                pin = pin.slice(0, -1);
                updateDots();
            }
        }

        // Initialize state
        updateDots();

        // Handle Login Click
        loginBtn.addEventListener('click', () => {
            if (pin.length >= 4) {
                loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span>`;
                setTimeout(() => {
                    // Simulation of success state
                    loginBtn.classList.replace('bg-primary-container', 'bg-green-500');
                    loginBtn.innerHTML = `<span class="material-symbols-outlined">check_circle</span>`;
                    setTimeout(() => {
                        alert("Access Granted: Welcome back Alejandro!");
                        location.reload();
                    }, 800);
                }, 1500);
            }
        });
    </script>
