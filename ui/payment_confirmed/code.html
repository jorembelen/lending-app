<script>
        // Simple micro-interaction: Confetti Effect
        function createConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#c3f400', '#abd600', '#ffffff', '#556d00'];

            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + Math.random() * 100,
                    size: Math.random() * 6 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 6.28,
                    spin: Math.random() * 0.2 - 0.1
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    p.y -= p.speed;
                    p.x += Math.sin(p.angle) * 2;
                    p.angle += p.spin;

                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);

                    if (p.y < -20) {
                        particles.splice(i, 1);
                    }
                });

                if (particles.length > 0) {
                    requestAnimationFrame(draw);
                }
            }
            draw();
        }

        // Trigger on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(createConfetti, 300);
        });

        // Click interaction for Back button
        document.querySelector('button.bg-primary-fixed').addEventListener('click', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                // Mock redirection
                console.log('Navigating back to route...');
            }, 300);
        });
    </script>
